slam_toolbox:
  ros__parameters:

    use_sim_time: true

    # Frames
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan

    # SLAM mode
    mode: mapping

    # Map settings
    resolution: 0.05
    publish_period_sec: 1.0

    # Scan matching
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.2

    # Loop closure
    do_loop_closing: true