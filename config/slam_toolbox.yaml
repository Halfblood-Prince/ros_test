
slam_toolbox:
  ros__parameters:
    use_sim_time: true
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping
    resolution: 0.05
    max_laser_range: 12.0
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 2.0
    minimum_time_interval: 0.1
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.2
    do_loop_closing: true
